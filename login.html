<!DOCTYPE html>
<html lang="uk">
<head>
    
    <meta charset="UTF-8">

    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Admin</title>

    
    <link rel="stylesheet" href="style.css">

    
    <link rel="stylesheet" href="login.css">
</head>

<body>


<section class="login-section">

    <!-- Контейнер форми -->
    <div class="login-box">

        
        <h1>Admin Login</h1>

        
        <form id="login-form">

            
            <input 
                type="text" 
                id="login"
                placeholder="Login"
                autocomplete="off"
            >

            
            <input 
                type="password"
                id="password"
                placeholder="Password"
            >

            <!-- Кнопка відправки -->
            <button type="submit">
                Log In
            </button>

            
            <p class="login-error"></p>

        </form>
    </div>

</section>


<script src="login.js"></script>

</body>
</html>
