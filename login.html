<!DOCTYPE html>
<html lang="uk">
<head>
    
    <meta charset="UTF-8">

    <!-- Адаптив -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Admin</title>

    <!-- Твої основні стилі сайту -->
    <link rel="stylesheet" href="style.css">

    <!-- Окремі стилі тільки для login сторінки -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

<!-- Головна секція авторизації -->
<section class="login-section">

    <!-- Контейнер форми -->
    <div class="login-box">

        <!-- Заголовок -->
        <h1>Admin Login</h1>

        <!-- Форма -->
        <form id="login-form">

            <!-- Поле логіна -->
            <input 
                type="text" 
                id="login"
                placeholder="Login"
                autocomplete="off"
            >

            <!-- Поле пароля -->
            <input 
                type="password"
                id="password"
                placeholder="Password"
            >

            <!-- Кнопка відправки -->
            <button type="submit">
                Log In
            </button>

            <!-- Сюди JS буде вставляти помилки -->
            <p class="login-error"></p>

        </form>
    </div>

</section>

<!-- Підключення JS -->
<script src="login.js"></script>

</body>
</html>
